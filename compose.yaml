services:

  database:
    container_name: async-fastapi-database
    image: postgres:18.1-alpine3.23
    environment: 
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    expose: 
      - 5432
    volumes:
      - database:/var/lib/postgresql
    healthcheck:
      test: 
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 5s

  app:
    container_name: async-fastapi-app
    build: .
    environment:
      SQLALCHEMY_DATABASE_URI: postgresql+asyncpg://user:password@database:5432/db
      SECRET_KEY: a_secret_key_longer_than_32_bytes
    ports: 
      - 8000:8000 
    depends_on:
      database:
        condition: service_healthy

volumes:
  database:
